<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur HEIC → JPEG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script async src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --text: #fff;
            --muted: rgba(255, 255, 255, 0.7);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --text: #1e293b;
                --muted: rgba(30, 41, 59, 0.6);
            }
            body {
                background: linear-gradient(135deg, #e0e7ff, #a5b4fc, #818cf8);
            }
            .card {
                background: rgba(255, 255, 255, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.5);
            }
            #dropZone p { color: rgba(30, 41, 59, 0.8); }
            #dropZone .icon { color: rgba(30, 41, 59, 0.6); }
            .controls label { color: rgba(30, 41, 59, 0.8); }
            .thumb .name { color: rgba(30, 41, 59, 0.8); }
            .toggle-btn { color: rgba(30, 41, 59, 0.7); }
            .toggle-btn.selected { color: #fff; }
            footer { color: rgba(30, 41, 59, 0.6); }
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #a8c0ff, #3f2b96); /* Subtle gradient */
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center; /* Center content vertically */
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { 
            max-width: 960px; 
            width: 100%; 
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .header-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
            animation: fadeInUp 0.6s ease-out;
        }
        .header-logo svg {
            width: 32px;
            height: 32px;
            color: #fff;
        }
        h1 { 
            font-size: 2.5rem; 
            font-weight: 700; 
            text-align: center; 
            margin-bottom: 0; 
            color: var(--text);
            background: linear-gradient(135deg, #f0f0ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        @media (prefers-color-scheme: light) {
            h1 {
                background: linear-gradient(135deg, #4f46e5, #7c3aed);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
        }
        .subtitle { 
            margin: 0; 
            color: var(--muted); 
            text-align: center;
            font-size: 1.1rem;
            font-weight: 400;
            max-width: 480px;
            line-height: 1.6;
        }
        .card {
            background: rgba(255, 255, 255, 0.15); /* Semi-transparent background */
            border-radius: 16px; /* Slightly larger border-radius */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); /* Stronger shadow */
            backdrop-filter: blur(10px); /* Glassmorphism blur */
            -webkit-backdrop-filter: blur(10px); /* Safari support */
            border: 1px solid rgba(255, 255, 255, 0.18); /* Fine white border */
            padding: 2.5rem; /* More padding */
            margin-bottom: 0; /* Remove margin-bottom as container uses gap */
            width: 100%;
        }
        #dropZone {
            border: 2px dashed rgba(255, 255, 255, 0.4); /* Lighter border */
            background: rgba(255, 255, 255, 0.05); /* Lighter background */
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease; /* Smooth transition */
            display: flex; /* Use flexbox for centering content */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            min-height: 180px;
        }
        #dropZone:hover {
            background: rgba(255, 255, 255, 0.1); /* Darker on hover */
            border-color: rgba(255, 255, 255, 0.6); /* Stronger border on hover */
        }
        #dropZone.dragover {
            background: rgba(0, 102, 255, 0.15); /* Primary color background on dragover */
            border-color: var(--primary); /* Primary color border on dragover */
        }
        #dropZone input { display: none; }
        #dropZone .icon { 
            width: 60px; 
            height: 60px; 
            color: rgba(255, 255, 255, 0.7); /* Icon color */
            margin-bottom: 0.5rem;
        }
        #dropZone p { 
            color: rgba(255, 255, 255, 0.8); /* Text color */
            margin-bottom: 0; /* Remove default paragraph margin */
            font-size: 1.2rem;
            font-weight: 500;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            position: relative;
            text-align: center;
            padding: 0.75rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .thumb:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .thumb img { 
            max-width: 100%; 
            max-height: 100px; 
            display: block; 
            margin: 0 auto 0.5rem; 
            border-radius: 6px;
            object-fit: cover;
        }
        .thumb .name { 
            font-size: 0.8rem; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            color: rgba(255, 255, 255, 0.8);
        }
        .thumb .status { 
            font-size: 0.75rem; 
            margin-top: 0.5rem;
            font-weight: 500;
        }
        .thumb .status.success { color: #4ade80; }
        .thumb .status.error { color: #f87171; }
        .thumb a {
            position: absolute;
            right: 6px;
            top: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            background: rgba(0,0,0,0.4);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .thumb a:hover {
            background: rgba(0,0,0,0.7);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
            margin-top: 1.5rem;
        }
        .controls label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .format {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .slider { flex: 1 1 200px; position: relative; }
        .slider input { width: 100%; -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; }
        .slider input::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #7c3aed; cursor: pointer; box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .slider input::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #7c3aed; cursor: pointer; border: none; }
        .slider .badge { position: absolute; top: -28px; right: 0; background: #7c3aed; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
        button {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.7rem 1.4rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        button:hover { 
            background: var(--primary-dark); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
        }
        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(0, 102, 255, 0.3);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        /* Toggle group for format selection */
        .toggle-group {
            display: inline-flex;
            gap: 0.4rem;
            background: rgba(255,255,255,0.1);
            padding: 0.3rem;
            border-radius: 8px;
        }
        .toggle-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .toggle-btn.selected {
            background: #7c3aed;
            color: #fff;
        }
        .progress {
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
            height: 10px;
            margin-top: 1rem;
        }
        .progress div {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            width: 0;
            transition: width 0.4s ease;
            border-radius: 10px;
        }
        .error-box {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            color: #fca5a5;
            display: none;
            backdrop-filter: blur(4px);
        }
        footer {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7); /* Lighter text for footer */
            margin-top: 2rem; /* Adjusted margin */
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .header-logo { width: 44px; height: 44px; }
            .header-logo svg { width: 24px; height: 24px; }
            .subtitle { font-size: 0.95rem; }
            .card { padding: 1.5rem; }
            #dropZone { padding: 2rem 1rem; min-height: 140px; }
            #dropZone p { font-size: 1rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .slider { flex: 1 1 auto; }
            .format { justify-content: center; }
            button { justify-content: center; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .header-logo { width: 36px; height: 36px; }
            .header-logo svg { width: 20px; height: 20px; }
            .subtitle { font-size: 0.85rem; }
            .card { padding: 1rem; border-radius: 12px; }
            #dropZone { padding: 1.5rem 0.8rem; min-height: 120px; }
            #dropZone .icon { width: 40px; height: 40px; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.6rem; }
            .thumb { padding: 0.5rem; }
        }

        /* Entrance animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            animation: fadeInUp 0.6s ease-out 0.15s both;
        }
        .header {
            animation: fadeInUp 0.6s ease-out;
        }
        .subtitle {
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }
        footer {
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }
    </style>
</head>
<body>
    <div class="container">        <div class="header">
            <div class="header-logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
                </svg>
            </div>
            <h1>Convertisseur HEIC → JPEG</h1>
            <p class="subtitle">Convertissez vos images HEIC en JPEG directement dans votre navigateur.</p>
        </div>
        
        <div class="card">
            <div id="dropZone">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-1.5-9.75l-3.75-3.75M12 18.75V4.5m0 0L7.5 9.75m4.5-5.25z" />
                </svg>
                <p>Glissez-déposez vos images ici ou <strong>cliquez</strong> pour les sélectionner</p>
                <input type="file" id="fileInput" accept=".heic,.heif" multiple>
            </div>
            
            <div id="errorBox" class="error-box"></div>
            <div class="gallery" id="gallery"></div>
            
            <div class="controls">
                <div class="slider">
                    <label for="quality">Qualité JPEG: <span id="qualityVal">80</span>%</label>
                    <input type="range" id="quality" min="1" max="100" value="80">
                    <div class="badge" id="qualityBadge">80%</div>
                </div>
                <div class="format">
                    <label>Format:</label>
                    <div class="toggle-group" id="formatToggle">
                        <button type="button" class="toggle-btn selected" data-value="image/jpeg">JPEG</button>
                        <button type="button" class="toggle-btn" data-value="image/png">PNG</button>
                        <button type="button" class="toggle-btn" data-value="image/webp">WEBP</button>
                    </div>
                </div>
                <button id="convertBtn" disabled>✨ Convertir</button>
                <button id="downloadAllBtn" disabled>📦 ZIP</button>
            </div>
            
            <div class="progress" id="progressBar"><div></div></div>
        </div>
        
        <footer>© 2026 • Tout se passe dans votre navigateur • Zéro serveur</footer>
    </div>

    <script>
    const $ = id => document.getElementById(id);
    let files = [], previews = [];
    let selectedFormat = 'image/jpeg';

    const dropZone = $('dropZone');
    const fileInput = $('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    
    // --- Drag & Drop handlers ---
    // These MUST call preventDefault() on dragover to allow the browser to accept drops
    
    function onDragOver(e) {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'copy';
        dropZone.classList.add('dragover');
    }
    
    function onDragEnter(e) {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'copy';
        dropZone.classList.add('dragover');
    }
    
    function onDragLeave(e) {
        e.preventDefault();
        e.stopPropagation();
        if (!dropZone.contains(e.relatedTarget)) {
            dropZone.classList.remove('dragover');
        }
    }
    
    function onDrop(e) {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove('dragover');
        const droppedFiles = e.dataTransfer.files;
        if (droppedFiles && droppedFiles.length > 0) {
            handleFiles(droppedFiles);
        }
    }
    
    // Register handlers on the drop zone
    dropZone.addEventListener('dragenter', onDragEnter, false);
    dropZone.addEventListener('dragover', onDragOver, false);
    dropZone.addEventListener('dragleave', onDragLeave, false);
    dropZone.addEventListener('drop', onDrop, false);
    
    // Also register on window to prevent the browser from intercepting the drop
    window.addEventListener('dragenter', e => { e.preventDefault(); }, false);
    window.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }, false);
    window.addEventListener('drop', e => { e.preventDefault(); }, false);
    
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    // Format toggle handling
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedFormat = btn.dataset.value;
        });
    });

    function showError(msg) {
        const box = $('errorBox');
        box.textContent = msg;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 5000);
    }

    function handleFiles(list) {
        const arr = Array.from(list);
        const heic = arr.filter(f => /\.(heic|heif)$/i.test(f.name));
        if (heic.length === 0) {
            showError('❌ Aucun fichier HEIC/HEIF trouvé');
            return;
        }
        if (heic.length !== arr.length) alert('⚠️ Certains fichiers ne sont pas HEIC/HEIF et seront ignorés.');
        heic.forEach(addFile);
        updateUI();
    }

    function addFile(file) {
        if (files.some(f => f.name === file.name && f.size === file.size)) return;
        files.push(file);
        const url = URL.createObjectURL(file);
        
        const div = document.createElement('div');
        div.className = 'thumb';
        
        const img = document.createElement('img');
        img.src = url;
        
        const name = document.createElement('div');
        name.className = 'name';
        name.title = file.name;
        name.textContent = file.name.slice(0, 15) + (file.name.length > 15 ? '...' : '');
        
        const status = document.createElement('div');
        status.className = 'status';
        status.textContent = '⏳ En attente...';
        
        div.appendChild(img);
        div.appendChild(name);
        div.appendChild(status);
        $('gallery').appendChild(div);
        
        previews.push({ file, url, element: div, statusEl: status, blob: null });
    }

    $('quality').addEventListener('input', e => {
        const val = e.target.value;
        $('qualityVal').textContent = val;
        $('qualityBadge').textContent = `${val}%`;
    });

    async function convertFile(file) {
        if (typeof heic2any === 'undefined') {
            throw new Error('heic2any non disponible - attendez le chargement de la page');
        }
        const result = await heic2any({ blob: file });
        return result;
    }

    async function blobToJpeg(heicResult, mime, quality) {
        // heic2any peut retourner un Blob, une Image ou un Canvas.
        // Cette fonction convertit le résultat en Blob du type MIME demandé.

        if (heicResult instanceof Blob) {
            // Si c'est déjà un Blob, on le renvoie tel quel (on suppose qu'il est compatible).
            return heicResult;
        }

        // Fonction utilitaire pour créer un Blob à partir d'un canvas
        const canvasToBlob = (canvas) => new Promise(resolve => {
            canvas.toBlob(resolve, mime, quality);
        });

        if (heicResult instanceof HTMLCanvasElement) {
            return canvasToBlob(heicResult);
        }

        if (heicResult instanceof HTMLImageElement || heicResult.src) {
            const canvas = document.createElement('canvas');
            canvas.width = heicResult.width;
            canvas.height = heicResult.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(heicResult, 0, 0);
            return canvasToBlob(canvas);
        }

        // Fallback : essayer d'utiliser toBlob si disponible
        if (typeof heicResult.toBlob === 'function') {
            return canvasToBlob(heicResult);
        }

        // Si aucune conversion possible, lever une erreur
        throw new Error('Impossible de convertir le résultat en Blob');
    }

    $('convertBtn').addEventListener('click', async () => {
        if (!files.length) return;
        setProcessing(true);
        const quality = parseInt($('quality').value) / 100;
        let done = 0;

        for (const item of previews) {
            const { file, element, statusEl } = item;
            try {
                statusEl.textContent = '⏳ Conversion...';
                statusEl.className = 'status';

                const heicResult = await convertFile(file);
                const mime = selectedFormat;
                const blob = await blobToJpeg(heicResult, mime, quality);

                item.blob = blob;
                const jpegUrl = URL.createObjectURL(blob);
                element.querySelector('img').src = jpegUrl;

                const dl = document.createElement('a');
                dl.href = jpegUrl;
                // Determine appropriate file extension based on selected MIME type
                let ext = '.jpg';
                if (mime === 'image/png') ext = '.png';
                else if (mime === 'image/webp') ext = '.webp';
                dl.download = file.name.replace(/\.(heic|heif)$/i, ext);
                dl.textContent = '⬇️';
                dl.title = 'Télécharger';
                element.appendChild(dl);

                statusEl.textContent = '✅ OK';
                statusEl.className = 'status success';
            } catch (err) {
                console.error('Erreur:', err);
                statusEl.textContent = '❌ Erreur';
                statusEl.className = 'status error';
                showError(`Erreur: ${err.message}`);
            }
            done++;
            updateProgress(done / files.length);
        }
        setProcessing(false);
    });

    $('downloadAllBtn').addEventListener('click', async () => {
        if (!files.length) return;
        setProcessing(true);
        const quality = parseInt($('quality').value) / 100;
        const zip = new JSZip();
        let done = 0, hasBlob = false;

        for (const item of previews) {
            const { file, statusEl } = item;
            try {
                if (!item.blob) {
                    statusEl.textContent = '⏳ Conv...';
                    const heicResult = await convertFile(file);
                    const mime = selectedFormat;
                    const blob = await blobToJpeg(heicResult, mime, quality);
                    item.blob = blob;
                }
                if (item.blob) {
                    // Use the same extension logic as for individual downloads
                    const mime = selectedFormat;
                    let ext = '.jpg';
                    if (mime === 'image/png') ext = '.png';
                    else if (mime === 'image/webp') ext = '.webp';
                    zip.file(file.name.replace(/\.(heic|heif)$/i, ext), item.blob);
                    hasBlob = true;
                    statusEl.textContent = '✅ ZIP';
                    statusEl.className = 'status success';
                }
            } catch (e) {
                console.warn('Erreur ZIP:', e);
                statusEl.textContent = '❌ Err';
                statusEl.className = 'status error';
            }
            done++;
            updateProgress(done / files.length);
        }

        if (hasBlob) {
            try {
                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'images.zip';
                link.click();
                showError('✅ ZIP téléchargé !');
            } catch (e) {
                showError('Erreur ZIP: ' + e.message);
            }
        } else {
            showError('❌ Aucune image convertie');
        }
        setProcessing(false);
    });

    function updateUI() {
        const has = files.length > 0;
        $('convertBtn').disabled = !has;
        $('downloadAllBtn').disabled = !has;
    }

    function setProcessing(flag) {
        $('convertBtn').disabled = flag || files.length === 0;
        $('downloadAllBtn').disabled = flag || files.length === 0;
        if (!flag) $('progressBar').firstElementChild.style.width = '0%';
    }

    function updateProgress(r) {
        $('progressBar').firstElementChild.style.width = Math.round(r * 100) + '%';
    }
    </script>
</body>
</html>
