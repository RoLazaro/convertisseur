<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur HEIC vers JPEG - Restez informé</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 36px;
    }
    h1 { color: #333; font-size: 28px; margin-bottom: 15px; }
    p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
    .form-group { display: flex; flex-direction: column; gap: 15px; }
    input[type="email"] {
      padding: 16px 20px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 16px; transition: border-color 0.3s;
    }
    input[type="email"]:focus { outline: none; border-color: #667eea; }
    button {
      padding: 16px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
    .success { display: none; color: #10b981; font-weight: 600; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📷</div>
    <h1>Convertisseur Vidéo & HEIC</h1>
    <p>Convertissez vos vidéos et photos HEIC en un clic.<br>Inscrivez-vous pour être notifié des nouvelles fonctionnalités !</p>
    <form id="signupForm" class="form-group">
      <input type="email" id="email" placeholder="Votre adresse email" required>
      <button type="submit">Me prévenir</button>
    </form>
    <p class="success" id="success">Merci ! Nous vous préviendrons.</p>
  </div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      console.log('Email capturé:', email);
      this.style.display = 'none';
      document.getElementById('success').style.display = 'block';
    });
  </script>
</body>
</html>
