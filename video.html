<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur Vidéo</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #8b5cf6;
      --primary-dark: #7c3aed;
      --accent: #ec4899;
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.7);
    }
    @media (prefers-color-scheme: light) {
      :root { --text: #1e293b; --muted: rgba(30, 41, 59, 0.6); }
      body { background: linear-gradient(135deg, #fce7f3, #e0e7ff, #c4b5fd); }
      .card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.5); }
      #dropZone p { color: rgba(30, 41, 59, 0.8); }
      .controls label { color: rgba(30, 41, 59, 0.8); }
      .toggle-btn { color: rgba(30, 41, 59, 0.7); }
      .toggle-btn.selected { color: #fff; }
      footer { color: rgba(30, 41, 59, 0.6); }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e1b4b, #312e81, #581c87);
      color: var(--text); display: flex; justify-content: center;
      min-height: 100vh; padding: 2rem 1rem;
    }
    .container { max-width: 700px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; align-items: center; }
    .header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .header-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(236, 72, 153, 0.35);
    }
    .header-logo svg { width: 32px; height: 32px; color: #fff; }
    h1 {
      font-size: 2.5rem; font-weight: 700; text-align: center;
      background: linear-gradient(135deg, #fbcfe8, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.02em;
    }
    @media (prefers-color-scheme: light) {
      h1 { background: linear-gradient(135deg, #db2777, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    }
    .subtitle { margin: 0; color: var(--muted); text-align: center; font-size: 1.1rem; max-width: 520px; line-height: 1.6; }
    .card {
      background: rgba(255, 255, 255, 0.15); border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18); padding: 2rem; width: 100%;
    }
    #dropZone {
      border: 2px dashed rgba(255, 255, 255, 0.4); background: rgba(255, 255, 255, 0.05);
      border-radius: 12px; padding: 3rem 2rem; text-align: center; cursor: pointer;
      transition: all 0.3s ease; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; min-height: 150px;
    }
    #dropZone:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.6); }
    #dropZone.dragover { background: rgba(139, 92, 246, 0.15); border-color: var(--primary); }
    #dropZone input { display: none; }
    #dropZone .icon { width: 60px; height: 60px; color: rgba(255, 255, 255, 0.7); }
    #dropZone p { color: rgba(255, 255, 255, 0.8); font-size: 1.2rem; font-weight: 500; margin: 0; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .thumb {
      background: rgba(255, 255, 255, 0.08); border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12); overflow: hidden;
      position: relative; text-align: center; padding: 0.75rem;
    }
    .thumb video { max-width: 100%; max-height: 100px; display: block; margin: 0 auto 0.5rem; border-radius: 6px; object-fit: cover; background: #000; }
    .thumb .name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255, 255, 255, 0.8); }
    .thumb .status { font-size: 0.75rem; margin-top: 0.5rem; font-weight: 500; }
    .thumb .status.success { color: #4ade80; }
    .thumb .status.error { color: #f87171; }
    .thumb .status.processing { color: #fbbf24; }
    .thumb .remove-btn {
      position: absolute; left: 6px; top: 6px; font-size: 0.9rem; cursor: pointer; border: none;
      background: rgba(239, 68, 68, 0.8); color: white; width: 24px; height: 24px; display: flex;
      align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s;
    }
    .thumb .remove-btn:hover { background: #dc2626; }
    .thumb a {
      position: absolute; right: 6px; top: 6px; font-size: 1.1rem; cursor: pointer; text-decoration: none;
      background: rgba(0,0,0,0.4); width: 28px; height: 28px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; transition: background 0.2s;
    }
    .thumb a:hover { background: rgba(0,0,0,0.7); }
    .controls { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-top: 1.5rem; }
    .controls label { color: rgba(255, 255, 255, 0.8); font-weight: 500; font-size: 0.9rem; }
    .format { display: flex; align-items: center; gap: 0.6rem; }
    .toggle-group {
      display: inline-flex; gap: 0.3rem; background: rgba(255,255,255,0.1);
      padding: 0.3rem; border-radius: 8px; flex-wrap: wrap;
    }
    .toggle-btn {
      background: transparent; border: none; color: rgba(255,255,255,0.8);
      padding: 0.4rem 0.7rem; border-radius: 6px; cursor: pointer;
      transition: background 0.2s, color 0.2s; font-size: 0.85rem; font-weight: 500;
    }
    .toggle-btn.selected { background: #ec4899; color: #fff; }
    button {
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      padding: 0.7rem 1.4rem; font-weight: 600; font-size: 0.95rem; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }
    button:hover { background: var(--primary-dark); transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    button.danger { background: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
    button.danger:hover { background: #dc2626; }
    .progress { width: 100%; background: rgba(255, 255, 255, 0.15); border-radius: 10px; overflow: hidden; height: 10px; margin-top: 1rem; }
    .progress div { height: 100%; background: linear-gradient(90deg, #ec4899, #8b5cf6); width: 0; transition: width 0.4s ease; border-radius: 10px; }
    .error-box {
      background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 8px; padding: 1rem; margin-top: 1rem; color: #fca5a5; display: none;
    }
    .info-box {
      background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4);
      border-radius: 8px; padding: 1rem; margin-top: 1rem; color: #93c5fd; display: none; font-size: 0.9rem;
    }
    footer { text-align: center; font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); margin-top: 2rem; }
    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; } .card { padding: 1.5rem; }
      #dropZone { padding: 2rem 1rem; min-height: 120px; }
      .controls { flex-direction: column; align-items: stretch; } button { justify-content: center; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.4rem; } .card { padding: 1rem; }
      #dropZone { padding: 1.5rem 0.8rem; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>
      <h1>Convertisseur Vidéo</h1>
      <p class="subtitle">Conversion par le navigateur, sans téléchargement serveur.</p>
    </div>

    <div class="card">
      <div id="dropZone">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-1.5-9.75l-3.75-3.75M12 18.75V4.5m0 0L7.5 9.75m4.5-5.25z" />
        </svg>
        <p>Glissez-déposez vos vidéos ici ou <strong>cliquez</strong> pour les sélectionner</p>
        <input type="file" id="fileInput" accept="video/*" multiple>
      </div>

      <div id="errorBox" class="error-box"></div>
      <div id="infoBox" class="info-box"></div>
      <div class="gallery" id="gallery"></div>

      <div class="controls">
        <div class="format">
          <label>Sortie :</label>
          <div class="toggle-group" id="formatToggle">
            <button type="button" class="toggle-btn selected" data-value="mp4">MP4</button>
            <button type="button" class="toggle-btn" data-value="webm">WebM</button>
            <button type="button" class="toggle-btn" data-value="gif">GIF</button>
          </div>
        </div>
        <button id="convertBtn" disabled>🎬 Convertir</button>
        <button id="downloadAllBtn" disabled>📦 ZIP</button>
        <button id="clearBtn" class="danger">🗑️ Effacer</button>
      </div>

      <div class="progress" id="progressBar"><div></div></div>
    </div>

    <footer>© 2026 • Conversion via API native du navigateur</footer>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let files = [], previews = [];
    let selectedFormat = 'mp4';

    const dropZone = $('dropZone');
    const fileInput = $('fileInput');
    const gallery = $('gallery');
    const errorBox = $('errorBox');
    const infoBox = $('infoBox');
    const progressFill = $('progressBar').firstElementChild;
    const convertBtn = $('convertBtn');
    const downloadAllBtn = $('downloadAllBtn');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedFormat = btn.dataset.value;
      });
    });

    $('clearBtn').addEventListener('click', () => {
      previews.forEach(p => { if (p.url) URL.revokeObjectURL(p.url); if (p.outputUrl) URL.revokeObjectURL(p.outputUrl); });
      files = []; previews = []; gallery.innerHTML = '';
      convertBtn.disabled = true; downloadAllBtn.disabled = true;
      progressFill.style.width = '0%';
      fileInput.value = '';
    });

    function showError(msg) {
      errorBox.textContent = msg; errorBox.style.display = 'block';
      setTimeout(() => { errorBox.style.display = 'none'; }, 6000);
    }
    function showInfo(msg) {
      infoBox.textContent = msg; infoBox.style.display = 'block';
      setTimeout(() => { infoBox.style.display = 'none'; }, 4000);
    }

    function handleFiles(list) {
      const videos = Array.from(list);
      if (!videos.length) { showError('❌ Aucun fichier'); return; }
      videos.forEach(addFile);
      convertBtn.disabled = false;
      downloadAllBtn.disabled = false;
    }

    function removeFile(file, div) {
      const idx = files.indexOf(file);
      if (idx !== -1) files.splice(idx, 1);
      const pIdx = previews.findIndex(p => p.file === file);
      if (pIdx !== -1) {
        const p = previews[pIdx];
        if (p.url) URL.revokeObjectURL(p.url);
        if (p.outputUrl) URL.revokeObjectURL(p.outputUrl);
        previews.splice(pIdx, 1);
      }
      div.remove();
      if (files.length === 0) {
        convertBtn.disabled = true;
        downloadAllBtn.disabled = true;
        fileInput.value = '';
        progressFill.style.width = '0%';
      }
    }

    function addFile(file) {
      if (files.some(f => f.name === file.name && f.size === file.size)) return;
      files.push(file);
      const url = URL.createObjectURL(file);
      const div = document.createElement('div');
      div.className = 'thumb';
      
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.innerHTML = '✕';
      removeBtn.onclick = () => removeFile(file, div);
      
      const video = document.createElement('video');
      video.src = url; video.muted = true; video.preload = 'metadata';
      const name = document.createElement('div');
      name.className = 'name'; name.textContent = file.name;
      const status = document.createElement('div');
      status.className = 'status'; status.textContent = '⏳ En attente...';
      div.appendChild(removeBtn); div.appendChild(video); div.appendChild(name); div.appendChild(status);
      gallery.appendChild(div);
      previews.push({ file, url, element: div, statusEl: status, blob: null, outputUrl: null });
    }

    const cfgMap = {
      mp4: { ext: 'mp4', mime: 'video/mp4', codecs: 'video/mp4;codecs=h264,aac' },
      webm: { ext: 'webm', mime: 'video/webm', codecs: 'video/webm;codecs=vp9,opus' },
      gif: { ext: 'gif', mime: 'image/gif' }
    };

    convertBtn.addEventListener('click', async () => {
      if (!files.length) return;
      convertBtn.disabled = true;
      downloadAllBtn.disabled = true;
      document.querySelectorAll('.remove-btn').forEach(btn => btn.style.display = 'none');
      let done = 0;
      const cfg = cfgMap[selectedFormat];

      for (const item of previews) {
        const { file, statusEl, element } = item;
        try {
          statusEl.textContent = selectedFormat === 'gif' ? '⏳ Analyse...' : '⏳ Encodage...';
          statusEl.className = 'status processing';

          const videoEl = document.createElement('video');
          videoEl.muted = true;
          videoEl.playsInline = true;
          videoEl.crossOrigin = 'anonymous';
          const fileUrl = URL.createObjectURL(file);
          videoEl.src = fileUrl;
          await new Promise((resolve, reject) => {
            videoEl.onloadedmetadata = resolve;
            videoEl.onerror = () => reject(new Error('Impossible de lire le fichier'));
            setTimeout(() => reject(new Error('Timeout')), 15000);
            videoEl.load();
          });

          const w = Math.min(720, videoEl.videoWidth || 640);
          const h = Math.min(480, videoEl.videoHeight || 480);
          const dur = videoEl.duration || 5;

          if (selectedFormat === 'gif') {
            statusEl.textContent = '⏳ Génération GIF...';
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');

            const gif = new GIF({
              workers: 1,
              quality: 10,
              width: w,
              height: h,
              workerURL: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
            });

            const fps = 10;
            const total = Math.min(Math.floor(dur * fps), 100);
            videoEl.currentTime = 0;

            for (let i = 0; i < total; i++) {
              videoEl.currentTime = i / fps;
              await new Promise(r => { videoEl.onseeked = r; });
              ctx.drawImage(videoEl, 0, 0, w, h);
              gif.addFrame(ctx, { copy: true, delay: 100 / fps });
              const pct = Math.round((i / total) * 100);
              statusEl.textContent = `⏳ GIF ${pct}%`;
              progressFill.style.width = pct + '%';
            }

            const gifBlob = await new Promise(r => {
              gif.on('progress', p => {
                statusEl.textContent = `⏳ Finalisation GIF ${Math.round(p*100)}%`;
              });
              gif.on('finished', r);
              gif.render();
            });

            item.blob = gifBlob;
            item.outputUrl = URL.createObjectURL(gifBlob);
            const existing = element.querySelector('a');
            if (existing) existing.remove();
            const dl = document.createElement('a');
            dl.href = item.outputUrl; dl.download = file.name.replace(/\.[^.]+$/, '.gif');
            dl.textContent = '⬇️';
            element.appendChild(dl);

            const thumbVideo = element.querySelector('video');
            thumbVideo.src = item.outputUrl;
            thumbVideo.loop = true;
          } else {
            statusEl.textContent = `⏳ Encodage ${cfg.ext.toUpperCase()}...`;
            const stream = videoEl.captureStream(30);
            const chunks = [];
            let mimeType = cfg.codecs;
            if (!MediaRecorder.isTypeSupported(mimeType)) {
              mimeType = cfg.mime;
              if (!MediaRecorder.isTypeSupported(mimeType)) {
                throw new Error('Format ' + cfg.ext.toUpperCase() + ' non supporté par votre navigateur');
              }
            }
            const recorder = new MediaRecorder(stream, { mimeType });
            recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };

            const recordingDone = new Promise(r => { recorder.onstop = r; });
            recorder.start(1000);
            videoEl.play();
            await new Promise(r => setTimeout(r, Math.min(dur * 1000, 15000)));
            recorder.stop();
            videoEl.pause();
            await recordingDone;

            const blob = new Blob(chunks, { type: cfg.mime });
            item.blob = blob;
            item.outputUrl = URL.createObjectURL(blob);
            const existing = element.querySelector('a');
            if (existing) existing.remove();
            const dl = document.createElement('a');
            dl.href = item.outputUrl;
            dl.download = file.name.replace(/\.[^.]+$/, '.' + cfg.ext);
            dl.textContent = '⬇️';
            element.appendChild(dl);
          }

          URL.revokeObjectURL(fileUrl);
          statusEl.textContent = '✅ OK';
          statusEl.className = 'status success';
        } catch (err) {
          console.error(err);
          statusEl.textContent = '❌ Erreur';
          statusEl.className = 'status error';
          showError('Erreur: ' + err.message);
        }
        done++;
        progressFill.style.width = Math.round(done / files.length * 100) + '%';
      }
      convertBtn.disabled = false;
      downloadAllBtn.disabled = false;
    });

    downloadAllBtn.addEventListener('click', async () => {
      const zip = new JSZip();
      for (const item of previews) {
        if (item.blob) {
          const ext = cfgMap[selectedFormat].ext;
          zip.file(item.file.name.replace(/\.[^.]+$/, '.' + ext), item.blob);
        }
      }
      if (zip.files.length) {
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = 'videos.zip';
        link.click();
        showInfo('✅ ZIP créé');
      }
    });
  </script>
</body>
</html>
