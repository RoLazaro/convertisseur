<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur Vidéo</title>
  <!-- Utilisation de ffmpeg v0.9.5 (Mono-thread, compatible Safari/Brave/GitHub Pages) -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.9.5/dist/ffmpeg.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b, #312e81, #581c87);
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      text-align: center;
    }
    h1 { margin-bottom: 20px; }
    #dropZone {
      border: 2px dashed rgba(255,255,255,0.3);
      padding: 40px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    button {
      padding: 15px 30px;
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }
    button:disabled { background: #666; }
    #status { margin-top: 20px; color: #fbbf24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 Convertisseur Vidéo</h1>
    <div id="dropZone">
      <p>Cliquez pour sélectionner une vidéo</p>
      <input type="file" id="fileInput" accept="video/*" style="display:none">
    </div>
    <button id="convertBtn" disabled>Convertir en MP4</button>
    <div id="status"></div>
  </div>

  <script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    let file = null;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      file = e.target.files[0];
      status.textContent = 'Fichier chargé : ' + file.name;
      convertBtn.disabled = false;
    };

    convertBtn.onclick = async () => {
      if (!ffmpeg.isLoaded()) {
        status.textContent = 'Chargement de FFmpeg... (cela peut prendre quelques secondes)';
        await ffmpeg.load();
      }
      
      status.textContent = 'Conversion en cours...';
      
      // Utilisation de l'API v0.9 (FS + run)
      ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
      await ffmpeg.run('-i', 'input.mp4', 'output.mp4');
      
      const data = ffmpeg.FS('readFile', 'output.mp4');
      
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = 'converti.mp4';
      a.click();
      
      status.textContent = 'Terminé !';
    };
  </script>
</body>
</html>
